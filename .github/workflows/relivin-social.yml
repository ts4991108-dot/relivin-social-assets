# relivin-social-assets
social assets
name: Relivin Weekly Social
 
# Generates 5 on-brand cards each week, queues them to Instagram + Facebook via
# Upload-Post (direct file upload — no image hosting needed), and prunes the
# archived cards after 30 days.
 
on:
  schedule:
    - cron: '7 15 * * 0'      # Sundays 15:07 UTC  (~8:07 AM Pacific)
  workflow_dispatch: {}        # adds a manual "Run workflow" button
 
permissions:
  contents: write              # lets the job commit the archive + prune
 
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
 
      - name: Install Python deps
        run: pip install pillow requests
 
      - name: Fetch brand fonts (Poppins + Lora)
        run: |
          mkdir -p fonts
          base="https://raw.githubusercontent.com/google/fonts/main"
          curl -sfL "$base/ofl/poppins/Poppins-Bold.ttf"        -o fonts/Poppins-Bold.ttf
          curl -sfL "$base/ofl/poppins/Poppins-Medium.ttf"      -o fonts/Poppins-Medium.ttf
          curl -sfL "$base/ofl/poppins/Poppins-Regular.ttf"     -o fonts/Poppins-Regular.ttf
          curl -sfL "$base/ofl/lora/Lora%5Bwght%5D.ttf"         -o fonts/Lora-Variable.ttf || true
          curl -sfL "$base/ofl/lora/Lora-Italic%5Bwght%5D.ttf"  -o fonts/Lora-Italic-Variable.ttf || true
 
      - name: Generate + queue this week's cards
        env:
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          RELIVIN_PROFILE: Relivin
          RELIVIN_PLATFORMS: instagram,facebook
        run: python scripts/relivin_publish.py --post --prune-days 30
 
      - name: Commit archive + prune
        run: |
          git config user.name  "relivin-bot"
          git config user.email "actions@users.noreply.github.com"
          git add social
          git commit -m "Weekly social cards + prune ($(date -u +%Y-%m-%d))" || echo "nothing to commit"
          git push
